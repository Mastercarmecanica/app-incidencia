<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Incidencias App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>

    <header>
        <h1>Incidencias</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn-icon" onclick="openSettings()" style="background: transparent; border: none; font-size: 1.5rem; color: white;">⚙️</button>
            <button class="btn-report" onclick="generateEmail()">Finalizar Jornada</button>
        </div>
    </header>

    <!-- El tablero ahora está vacío. app.js se encarga de rellenarlo leyendo la base de datos -->
    <div class="container" id="incidenciasContainer">
    </div>

    <!-- The FAB opens the form now -->
    <button class="fab" onclick="openForm()">+</button>

    <!-- NEW FORM MODAL -->
    <div class="modal" id="formModal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeForm()">←</button>
            <h2>Nueva Incidencia</h2>
        </div>
        <div class="form-body">
            
            <!-- Paso 1: Cliente -->

                <label class="form-label">1. Seleccionar Cliente</label>

                    <option value="TOP BRANDS S.A."></option>
                    <option value="FARMACEUTICA RECCIUS SPA"></option>
                    <option value="INSUMOS DE ESTETICA MEDIC-DENT SPA"></option>
                    <option value="LE VICE SPA"></option>
                    <option value="BOMBONES VARSOVIENNE S.A"></option>
                    <option value="BOZZO CHOCOLATES S.A."></option>
                    <option value="TH MEDICAL - TOPOX"></option>
                    <option value="SOCIEDAD COMERCIALIZADORA DE INSUMOS MEDICOS CLP S.A."></option>
                    <option value="MOULIE SPA"></option>
                    <option value="SOC. DE MANUFAC. DE EQUIPOS DENTALES LTDA.(ENVISTACO)"></option>
                    <option value="GRUPO BIOS S.A."></option>
                    <option value="COMERCIALIZADORA TERUMO CHILE"></option>
                    <option value="FRESENIUS KABI CHILE LTDA. (ID: 2267)"></option>
                    <option value="ANOVO ANDES S.A. (CEVA LOGISTICS)"></option>
                    <option value="IBM CHILE S.A.C"></option>
                    <option value="CIBERNOS"></option>
                    <option value="MT LOGISTICA SPA (TASA)"></option>

                    <option value="ARLAB"></option>
                    <option value="BOMI DE CHILE SPA"></option>
                    <option value="BIOMET CHILE S.A."></option>
                    <option value="BLUNDING"></option>
                    <option value="CLINICAL MARKET"></option>
                    <option value="INTEGRATED HEALTH SOLUTIONS CHILE S.A."></option>
                    <option value="MEDTRONIC"></option>
                    <option value="ABBOTT LABORATORIES DE CHILE LTDA."></option>
                    <option value="ARQUIMED LTDA"></option>
                    <option value="FLAMA CHILE S.A."></option>
                    <option value="GENEXPRESS"></option>

                    <option value="LABIN CHILE S.A. (WIENER LAB)"></option>

                    <option value="MEGALABS (L CHILE) SPA"></option>
                    <option value="WORLD COURIER CHILE LTDA. (ID: 2264)"></option>
                    <option value="GUERBET"></option>
                    <option value="INDUSTRIA OPTICA RODENSTOCK CHILE S.A."></option>
                    <option value="INGRAM MICRO CHILE S.A."></option>
                    <option value="INTCOMEX S.A"></option>
                    <option value="MEGALUX (CHILE) S.A."></option>
                    <option value="OPTICAS GMO CHILE S.A"></option>
                    <option value="OPTICAS ROTTER Y KRAUSS LTDA"></option>
                    <option value="CIRUMED"></option>
                    <option value="PROMEDON CHILE S.A."></option>
                    <option value="SOCIEDAD COMERCIAL FERNANDEZ Y ASOCIADOS (OPTILAND)"></option>
                    <option value="ST COMPUTACION S.A."></option>

                    <option value="SEVEN PHARMA CHILE SPA"></option>
                    <option value="VIDEOCORP S.A."></option>
                    <option value="INVERSIONES PERL LOGISTICS SA ZONA SUR"></option>
                    <option value="INVERSIONES PERL LOGISTICS ISDIN B2C"></option>
                    <option value="INVERSIONES PERL LOGISTICS SA ZONA NORTE, V REGION Y SANTIAGO"></option>
                </datalist>
            </div>

            <!-- Paso 1.5: Agencia (Oculto por defecto) -->
            <div class="form-group" id="agenciaGroup" style="display: none;">
                <label class="form-label">1. Seleccionar Agencia</label>
                <input type="text" id="agenciaInput" list="agenciasList" class="text-input" placeholder="Escribe o selecciona una agencia..." style="margin-top: 0;">
                <datalist id="agenciasList">
                    <option value="Los Ángeles"></option>
                    <option value="Castro"></option>
                    <option value="Ancud"></option>
                    <option value="Puerto Montt"></option>
                    <option value="Temuco"></option>
                    <option value="Osorno"></option>
                    <option value="Valdivia"></option>
                    <option value="Linares"></option>
                    <option value="Curicó"></option>
                    <option value="Talca"></option>
                    <option value="Chillán"></option>
                    <option value="Concepción"></option>
                    <option value="Copiapó"></option>
                    <option value="La Serena - Francisco Alcaide"></option>
                    <option value="La Serena - Jose Ibacache"></option>
                    <option value="Los Vilos"></option>
                    <option value="Ovalle"></option>
                    <option value="Vallenar"></option>
                    <option value="Punta Arenas"></option>
                    <option value="Calama"></option>
                    <option value="Coyhaique"></option>
                    <option value="Arica"></option>
                    <option value="Iquique"></option>
                    <option value="Antofagasta"></option>
                    <option value="Valparaíso"></option>
                    <option value="Los Andes"></option>
                    <option value="Viña del Mar"></option>
                    <option value="Rancagua"></option>
                </datalist>
            </div>

            <!-- Paso 2: Problema -->
            <div class="form-group">
                <label class="form-label">2. Tipo de Problema</label>
                <div class="chip-group">
                    <div class="chip" onclick="selectIssue(this, 'devolucion')">Devolución</div>
                    <div class="chip" onclick="selectIssue(this, 'diferencia')">Diferencia de bultos</div>
                    <div class="chip" onclick="selectIssue(this, 'normal')">Caja o saco abierto</div>
                    <div class="chip" onclick="selectIssue(this, 'etiqueta')">Etiqueta deteriorada</div>
                    <div class="chip" onclick="selectIssue(this, 'faltante')">Faltante</div>
                </div>

                <!-- Se muestra solo si eligen Diferencia -->
                <div class="qty-selector" id="qtySelector">
                    <div class="qty-row">
                        <span>Manifestaba:</span>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('mani', -1)">-</button>
                            <span class="qty-value" id="mani-val">1</span>
                            <button class="qty-btn" onclick="changeQty('mani', 1)">+</button>
                        </div>
                    </div>
                    <div class="qty-row">
                        <span>Llegaron:</span>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('llego', -1)">-</button>
                            <span class="qty-value" id="llego-val">2</span>
                            <button class="qty-btn" onclick="changeQty('llego', 1)">+</button>
                        </div>
                    </div>
                </div>

                <!-- Agencia de origen (para diferencia/caja/etiqueta) -->
                <div id="agenciaPasoGroup" style="display:none; margin-top: 16px;">
                    <label class="form-label" style="margin-bottom: 8px;">Agencia de origen</label>
                    <input type="text" id="agenciaPasoInput" list="agenciasPasoList" class="text-input" placeholder="Selecciona la agencia..." style="margin-top: 0;">
                    <datalist id="agenciasPasoList">
                        <option value="Los Ángeles"></option>
                        <option value="Castro"></option>
                        <option value="Ancud"></option>
                        <option value="Puerto Montt"></option>
                        <option value="Temuco"></option>
                        <option value="Osorno"></option>
                        <option value="Valdivia"></option>
                        <option value="Linares"></option>
                        <option value="Curicó"></option>
                        <option value="Talca"></option>
                        <option value="Chillán"></option>
                        <option value="Concepción"></option>
                        <option value="Copiapó"></option>
                        <option value="La Serena - Francisco Alcaide"></option>
                        <option value="La Serena - Jose Ibacache"></option>
                        <option value="Los Vilos"></option>
                        <option value="Ovalle"></option>
                        <option value="Vallenar"></option>
                        <option value="Punta Arenas"></option>
                        <option value="Calama"></option>
                        <option value="Coyhaique"></option>
                        <option value="Arica"></option>
                        <option value="Iquique"></option>
                        <option value="Antofagasta"></option>
                        <option value="Valparaíso"></option>
                        <option value="Los Andes"></option>
                        <option value="Viña del Mar"></option>
                        <option value="Rancagua"></option>
                    </datalist>
                </div>
            </div>

            <!-- Paso 3: Foto -->
            <div class="form-group">
                <label class="form-label">3. Evidencia</label>
                <!-- accept="image/*" capture="environment" abre la cámara directamente en el celular -->
                <label class="camera-btn">
                    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display: none;">
                    <div class="camera-icon">📷</div>
                    <span id="photoLabel">Tomar Fotografía</span>
                </label>
            </div>

            <!-- Verificación IA -->
            <div class="form-group" id="aiVerificationGroup" style="display: none;">
                <label class="form-label">🤖 Resultado Inteligencia Artificial</label>
                <div id="aiLoading" style="display: none; color: #60a5fa; font-size: 0.9rem; margin-bottom: 8px; text-align: center;">
                    Analizando imagen... ⏳
                </div>
                <textarea id="aiSummary" class="text-input" rows="3" placeholder="El resultado aparecerá aquí..." style="display: none;"></textarea>
            </div>

            <button class="btn-submit" onclick="submitForm()">Registrar y enviar por WhatsApp</button>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div class="modal" id="settingsModal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeSettings()">←</button>
            <h2>Configuración IA</h2>
        </div>
        <div class="form-body">
            <div class="form-group">
                <label class="form-label">API Key de Gemini</label>
                <input type="password" id="apiKeyInput" placeholder="Pega tu clave aquí..." class="text-input">
                <p style="font-size: 0.8rem; color: #a0aec0; margin-top: 8px;">Se guarda de forma segura solo en este dispositivo.</p>
            </div>
            <button class="btn-submit" onclick="saveSettings()">Guardar Configuración</button>
            <button class="btn-submit" onclick="forceUpdate()" style="background: linear-gradient(135deg, #ef4444, #dc2626); margin-top: 10px;">Forzar Actualización (Borrar Caché)</button>
        </div>
    </div>

    <!-- Cargar la lógica de la base de datos -->
    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('Service Worker registrado'))
          .catch(err => console.log('Error en Service Worker', err));
      }
    </script>
</body>
</html>
